services:
  - type: web
    name: glosa-agencia-aduanal
    env: python
    plan: starter
    buildCommand: |
      apt-get update && apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-eng tesseract-ocr-spa
      pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
